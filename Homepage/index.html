<!DOCTYPE html>
<html lang="nb">

<head>
  <title>
    <%= productName %>
  </title>

  <meta charset="utf-8">
  <meta name="google-site-verification" content="LkuHAnz3ky-SOwublXFwOmO6FjRLPBRz_bc6IFUU--s" />
  <meta name="description" content="<%= productDescription %>">
  <meta name="keywords"
    content="Emil Berglund, EmilB04, full-stack developer, front-end developer, back-end developer, computer science, Vue.js, React, Quasar, web development, mobile apps, portfolio, Norway, Halden, Moss, Ostfold, hiof, bachelor, student, JavaScript, TypeScript, .NET, C#, Java, Python, html, css, react, vue">
  <meta name="author" content="Emil Berglund">
  <meta name="robots" content="index, follow">
  <meta name="language" content="Norwegian">
  <meta name="format-detection" content="telephone=no">
  <meta name="msapplication-tap-highlight" content="no">
  <meta name="viewport"
    content="user-scalable=no, initial-scale=1, maximum-scale=1, minimum-scale=1, width=device-width<% if (ctx.mode.cordova || ctx.mode.capacitor) { %>, viewport-fit=cover<% } %>">

  <!-- Open Graph Meta Tags -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="<%= productName %>">
  <meta property="og:description" content="<%= productDescription %>">
  <meta property="og:url" content="https://emilb.no">
  <meta property="og:site_name" content="Emil Berglund Portfolio">
  <meta property="og:locale" content="nb_NO">
  <meta property="og:locale:alternate" content="en_US">
  <meta property="og:image" content="https://emilb.no/images/og-image.jpg">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:image:alt" content="Emil Berglund - Full-Stack Developer Portfolio">

  <!-- Twitter Card Meta Tags -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="<%= productName %>">
  <meta name="twitter:description" content="<%= productDescription %>">
  <meta name="twitter:image" content="https://emilb.no/images/twitter-card.jpg">
  <meta name="twitter:image:alt" content="Emil Berglund - Full-Stack Developer Portfolio">

  <!-- Additional SEO Meta Tags -->
  <meta name="theme-color" content="#1976d2">
  <meta name="apple-mobile-web-app-title" content="Emil Berglund">
  <meta name="application-name" content="Emil Berglund Portfolio">
  <meta name="msapplication-TileColor" content="#1976d2">
  <link rel="canonical" href="https://emilb.no">

  <link rel="icon" type="image/ico" href="src/assets/icons/eb_whte.png">

  <!-- JSON-LD Structured Data -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@graph": [
      {
        "@type": "Person",
        "@id": "https://emilb.no/#person",
        "name": "Emil Berglund",
        "givenName": "Emil",
        "familyName": "Berglund",
        "url": "https://emilb.no",
        "image": "https://emilb.no/images/og-image.jpg",
        "jobTitle": "Computer Science Student & Full-Stack Developer",
        "description": "Emil Berglund er en informatikkstudent ved HiØ i Halden som spesialiserer seg innen webutvikling, Vue.js, React og full-stack utvikling.",
        "email": "mailto:emil.berglund@live.no",
        "nationality": "Norwegian",
        "sameAs": [
          "https://github.com/EmilB04",
          "https://www.linkedin.com/in/emilber/"
        ],
        "knowsAbout": [
          "Vue.js", "Quasar", "React", "React Native",
          "TypeScript", "JavaScript", "HTML", "CSS", "SCSS",
          "Java", "C#", ".NET", "Python",
          "Web Development", "Mobile Development", "Full-Stack Development",
          "Software Engineering", "Computer Science"
        ],
        "alumniOf": {
          "@type": "EducationalOrganization",
          "name": "Høgskolen i Østfold",
          "alternateName": "HiØ",
          "url": "https://www.hiof.no"
        },
        "address": {
          "@type": "PostalAddress",
          "addressLocality": "Halden",
          "addressRegion": "Østfold",
          "addressCountry": "NO"
        }
      },
      {
        "@type": "WebSite",
        "@id": "https://emilb.no/#website",
        "url": "https://emilb.no",
        "name": "Emil Berglund - Full-Stack Developer Portfolio",
        "description": "Portefølje til Emil Berglund - informatikkstudent og full-stack utvikler fra Halden, Norge.",
        "inLanguage": ["nb-NO", "en-US"],
        "author": { "@id": "https://emilb.no/#person" }
      }
    ]
  }
  </script>
</head>

</html>
